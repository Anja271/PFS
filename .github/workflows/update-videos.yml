name: Update livestream list

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"
  push:
    branches:
      - main
    paths:
      - "subtitles/*.vtt"
      - "highlight-subtitles/*.vtt"
      - "chapters/*.json"
      - "highlights/*.json"
      - "metadata/*.json"
      - "scripts/update_videos.py"
      - "scripts/update_heatmaps.py"
      - "scripts/update_highlights.py"

permissions:
  contents: write

concurrency:
  group: update-livestream-list
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install current yt-dlp
        run: python -m pip install --upgrade yt-dlp

      - name: Update video and subtitle data
        run: python scripts/update_videos.py

      - name: Update optional Most replayed data
        run: python scripts/update_heatmaps.py

      - name: Build subtitle coverage and highlight data
        run: python scripts/update_highlights.py

      - name: Commit changed data
        run: |
          if git diff --quiet -- data/videos.json data/subtitles.json data/chapters.json data/heatmaps.json data/subtitle-coverage.json data/highlights.json; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/videos.json data/subtitles.json data/chapters.json data/heatmaps.json data/subtitle-coverage.json data/highlights.json
          git commit -m "Update livestream and subtitle data"
          git push
